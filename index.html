<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The De-Coupler Extreme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #05010a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .arcade-font { font-family: 'Bungee', cursive; }
        .glitch-text { text-shadow: 3px 3px #00f2ff, -3px -3px #ff0055; }
        
        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
        }

        .screen {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.98);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 50; text-align: center; padding: 20px;
            overflow-y: auto;
        }

        .hidden { display: none !important; }

        .btn {
            background: #ff0055; color: white;
            padding: 12px 30px; border-radius: 12px;
            font-weight: 900; text-transform: uppercase;
            cursor: pointer; pointer-events: auto;
            border: 3px solid #fff;
            transition: all 0.2s;
        }
        .btn:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #666; }

        .setup-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .selection-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }

        .chip {
            padding: 8px 16px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 50px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
        }
        .chip.selected {
            background: #ff0055;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
        }

        .level-card {
            width: 70px; height: 70px;
            display: flex; align-items: center; justify-content: center;
            background: #1a1a1a; border: 2px solid #333;
            border-radius: 12px; cursor: pointer;
            transition: all 0.3s; position: relative;
        }
        .level-card.unlocked { border-color: #ff0055; background: #2a0a1a; }
        .level-card.locked { opacity: 0.4; cursor: not-allowed; }
        
        .custom-input {
            background: #000;
            border: 2px solid #333;
            padding: 8px 12px;
            border-radius: 8px;
            color: #fff;
            width: 100%;
            margin-top: 10px;
            outline: none;
        }
        .custom-input:focus { border-color: #ff0055; }

        canvas { display: block; }

        .danger-pulse { animation: pulse-red 0.5s infinite; }
        @keyframes pulse-red {
            0% { color: #ff0055; }
            50% { color: #fff; }
            100% { color: #ff0055; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Title Screen -->
        <div id="screen-main" class="screen">
            <h1 class="arcade-font text-5xl md:text-7xl mb-4 glitch-text">DE-COUPLER</h1>
            <p class="text-zinc-400 mb-10 tracking-[0.3em] uppercase font-bold text-sm">Single People's Revenge</p>
            <div class="flex flex-col gap-3">
                <button id="resume-btn" onclick="resumeGame()" class="btn arcade-font text-xl" disabled>RESUME</button>
                <button onclick="startNewGame()" class="btn arcade-font text-xl">NEW GAME</button>
            </div>
        </div>

        <!-- Setup Screen -->
        <div id="screen-setup" class="screen hidden">
            <h2 class="arcade-font text-3xl mb-6 text-cyan-400">Mission Briefing</h2>
            
            <div class="setup-section">
                <h3 class="text-xs uppercase font-black text-pink-500 mb-2">Choose Your Shooter (Single)</h3>
                <div id="singles-list" class="selection-list"></div>
                <input type="text" id="custom-single" class="custom-input text-sm" placeholder="+ Add Custom Single Name">
            </div>

            <div class="setup-section">
                <h3 class="text-xs uppercase font-black text-cyan-500 mb-2">Choose Target (Couple)</h3>
                <div id="couples-list" class="selection-list"></div>
                <input type="text" id="custom-couple" class="custom-input text-sm" placeholder="+ Add Custom Couple Name">
            </div>

            <div class="flex gap-4">
                <button onclick="showScreen('screen-main')" class="px-6 py-2 text-zinc-500 font-bold uppercase text-xs">Cancel</button>
                <button id="confirm-setup" onclick="showScreen('screen-levels')" class="btn arcade-font" disabled>Proceed to Mission</button>
            </div>
        </div>

        <!-- Level Select Menu -->
        <div id="screen-levels" class="screen hidden">
            <h2 class="arcade-font text-4xl mb-8">Select Level</h2>
            <div id="level-grid" class="grid grid-cols-5 gap-4 mb-10"></div>
            <button onclick="showScreen('screen-setup')" class="text-zinc-500 uppercase font-bold text-xs tracking-widest hover:text-white">Back to Setup</button>
        </div>

        <!-- Win/Clear Screen -->
        <div id="screen-win" class="screen hidden">
            <div id="win-emoji" class="text-6xl mb-4">💔</div>
            <h2 id="win-header" class="arcade-font text-5xl text-green-400 mb-2">STAGE CLEARED</h2>
            <div id="win-stage-title" class="text-yellow-400 arcade-font text-2xl mb-4"></div>
            <p id="win-message" class="text-zinc-400 mb-8 italic max-w-sm"></p>
            <button id="next-level-btn" onclick="showScreen('screen-levels')" class="btn arcade-font">Next Target</button>
        </div>

        <!-- Game Over Screen -->
        <div id="screen-fail" class="screen hidden">
            <h2 class="arcade-font text-5xl text-red-500 mb-2 uppercase">Mission Failed</h2>
            <p class="text-zinc-200 font-black text-xl mb-8 uppercase tracking-tighter italic">THE COUPLE ESCAPED INTO HAPPINESS 😭😭</p>
            <div class="flex gap-4">
                <button onclick="startGame(1)" class="btn arcade-font">Retry</button>
                <button onclick="showScreen('screen-levels')" class="btn arcade-font bg-zinc-800 border-zinc-600">Quit</button>
            </div>
        </div>

        <!-- In-Game HUD -->
        <div id="hud" class="absolute top-0 left-0 w-full p-4 pointer-events-none flex justify-between items-start z-10 hidden">
            <div class="bg-black/80 border-l-4 border-pink-500 p-2 px-4">
                <div class="text-[10px] text-pink-500 font-black uppercase" id="hud-stage-name">Stage</div>
                <div class="arcade-font text-xl"><span id="hud-score">0</span> / <span id="hud-goal">10</span></div>
            </div>
            <div class="bg-black/80 border-r-4 border-cyan-500 p-2 px-4 text-right">
                <div class="text-[10px] text-cyan-500 font-black uppercase">Stability</div>
                <div id="hud-health" class="arcade-font text-xl">100%</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const PRESETS = {
            singles: ["Arniv😎", "Priya😎", "Sourav😎"],
            couples: ["Keerthana♥️Vaishnav", "Amal♥️Rishi", "Ravi♥️Safa", "Amal 🌈Safa", "Asna♥️Ramshad"]
        };

        let currentLevel = 1;
        let unlockedLevel = 1;
        let gameActive = false;
        const userProgress = {};
        let isResumeMode = false;
        let score = 0;
        let health = 100;
        let selectedSingle = "";
        let selectedCouple = "";
        
        let enemies = [];
        let projectiles = [];
        let targetImg = new Image();
        targetImg.src = '1000253968.jpg';
        const LEVEL_COMPLETE_AUDIO_URL = "faah.mpeg";
        const levelCompleteSound = new Audio(LEVEL_COMPLETE_AUDIO_URL);
        levelCompleteSound.preload = 'auto';

        // GOAL UPDATED: Each level requirement increased by 6
        const LEVELS = {
            1: { goal: 11, speed: 4.5, rate: 1000, title: "Stopping Honeymoon", multi: 1 },
            2: { goal: 16, speed: 5.5, rate: 900, title: "Emotional Distance", multi: 1 },
            3: { goal: 21, speed: 6.8, rate: 800, title: "Reduced Communication", multi: 2 },
            4: { goal: 26, speed: 8.2, rate: 750, title: "Loss of Priority", multi: 2 },
            5: { goal: 31, speed: 10.0, rate: 650, title: "Irritation", multi: 2 },
            6: { goal: 36, speed: 12.5, rate: 550, title: "Avoidance", multi: 3 },
            7: { goal: 41, speed: 14.5, rate: 450, title: "Detachment", multi: 3 },
            8: { goal: 46, speed: 17.0, rate: 400, title: "Acceptance", multi: 3 },
            9: { goal: 56, speed: 19.5, rate: 350, title: "Letting Go", multi: 4 },
            10: { goal: 81, speed: 22.0, rate: 300, title: "Separation", multi: 5 }
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('hud').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if (id === 'screen-main') updateResumeButton();
            if (id === 'screen-setup') renderSetup();
            if (id === 'screen-levels') {
                prepareProgressForSelectedUser();
                renderLevelGrid();
            }
            gameActive = false;
        }

        function updateResumeButton() {
            const resumeBtn = document.getElementById('resume-btn');
            if (!resumeBtn) return;
            resumeBtn.disabled = Object.keys(userProgress).length === 0;
        }

        function prepareProgressForSelectedUser() {
            const userKey = selectedSingle.trim();
            if (!userKey) {
                unlockedLevel = 1;
                return;
            }
            const profile = userProgress[userKey];
            if (isResumeMode && profile) {
                unlockedLevel = profile.unlockedLevel;
                if (!selectedCouple && profile.lastCouple) selectedCouple = profile.lastCouple;
                return;
            }
            unlockedLevel = 1;
            userProgress[userKey] = { unlockedLevel: 1, lastCouple: selectedCouple };
        }

        function startNewGame() {
            currentLevel = 1;
            unlockedLevel = 1;
            isResumeMode = false;
            score = 0;
            health = 100;
            enemies = [];
            projectiles = [];
            selectedSingle = "";
            selectedCouple = "";
            document.getElementById('custom-single').value = '';
            document.getElementById('custom-couple').value = '';
            showScreen('screen-setup');
        }

        function resumeGame() {
            if (Object.keys(userProgress).length === 0) return;
            isResumeMode = true;
            showScreen('screen-setup');
        }

        function renderSetup() {
            const sList = document.getElementById('singles-list');
            const cList = document.getElementById('couples-list');
            sList.innerHTML = PRESETS.singles.map(s => `<div class="chip ${selectedSingle === s ? 'selected' : ''}" onclick="selectItem('single', '${s}')">${s}</div>`).join('');
            cList.innerHTML = PRESETS.couples.map(c => `<div class="chip ${selectedCouple === c ? 'selected' : ''}" onclick="selectItem('couple', '${c}')">${c}</div>`).join('');
            validateSetup();
        }

        function selectItem(type, val) {
            if (type === 'single') {
                selectedSingle = val;
                document.getElementById('custom-single').value = '';
                if (isResumeMode && userProgress[selectedSingle]?.lastCouple) {
                    selectedCouple = userProgress[selectedSingle].lastCouple;
                }
            }
            else { selectedCouple = val; document.getElementById('custom-couple').value = ''; }
            renderSetup();
        }

        document.getElementById('custom-single').addEventListener('input', (e) => {
            selectedSingle = e.target.value;
            if (isResumeMode && userProgress[selectedSingle]?.lastCouple) {
                selectedCouple = userProgress[selectedSingle].lastCouple;
            }
            renderSetup();
        });
        document.getElementById('custom-couple').addEventListener('input', (e) => { selectedCouple = e.target.value; renderSetup(); });

        function validateSetup() {
            document.getElementById('confirm-setup').disabled = !(selectedSingle && selectedCouple);
        }

        function renderLevelGrid() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const card = document.createElement('div');
                const isUnlocked = i <= unlockedLevel;
                card.className = `level-card arcade-font text-2xl ${isUnlocked ? 'unlocked' : 'locked'}`;
                card.innerHTML = `${i}${!isUnlocked ? '<span class="absolute bottom-1 right-1">🔒</span>' : ''}`;
                if (isUnlocked) card.onclick = () => startGame(i);
                grid.appendChild(card);
            }
        }

        class Enemy {
            constructor(config) {
                this.radius = 55;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius * 2;
                this.speed = config.speed * (0.9 + Math.random() * 0.2);
                this.name = selectedCouple;
                this.sine = Math.random() * 0.02;
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.y * this.sine) * (currentLevel > 4 ? 6 : 2.5);
            }
            draw() {
                ctx.shadowBlur = 10; ctx.shadowColor = '#ff0055';
                ctx.fillStyle = 'rgba(26, 0, 10, 0.95)';
                ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const words = this.name.split('♥️');
                if (words.length > 1) {
                    ctx.font = 'bold 11px Inter'; ctx.fillText(words[0], this.x, this.y - 12);
                    ctx.font = '16px Inter'; ctx.fillText('💔', this.x, this.y);
                    ctx.font = 'bold 11px Inter'; ctx.fillText(words[1], this.x, this.y + 12);
                } else {
                    ctx.font = 'bold 11px Inter'; ctx.fillText(this.name, this.x, this.y);
                }
            }
        }

        class Projectile {
            constructor(x, y) { this.x = x; this.y = y; this.speed = 28; this.radius = 7; }
            update() { this.y -= this.speed; }
            draw() {
                ctx.fillStyle = '#00f2ff'; ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        const player = { x: 0, y: 0 };

        function startGame(lvl) {
            currentLevel = lvl; score = 0; health = 100; enemies = []; projectiles = []; gameActive = true;
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('hud-stage-name').innerText = LEVELS[currentLevel].title;
            updateHUD();
            spawnLoop();
        }

        function spawnLoop() {
            if (!gameActive) return;
            const config = LEVELS[currentLevel];
            const count = Math.ceil(Math.random() * config.multi);
            for(let i = 0; i < count; i++) {
                setTimeout(() => {
                    if (gameActive) enemies.push(new Enemy(config));
                }, i * 100);
            }
            setTimeout(spawnLoop, config.rate);
        }

        function updateHUD() {
            document.getElementById('hud-score').innerText = score;
            document.getElementById('hud-goal').innerText = LEVELS[currentLevel].goal;
            document.getElementById('hud-health').innerText = health + '%';
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameActive) {
                ctx.fillStyle = '#fff'; ctx.beginPath();
                ctx.moveTo(player.x, player.y - 25); ctx.lineTo(player.x - 20, player.y + 15); ctx.lineTo(player.x + 20, player.y + 15);
                ctx.fill();
                ctx.fillStyle = '#00f2ff'; ctx.font = '900 13px Inter'; ctx.textAlign = 'center';
                ctx.fillText(selectedSingle, player.x, player.y + 35);
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    projectiles[i].update(); projectiles[i].draw();
                    if (projectiles[i].y < 0) projectiles.splice(i, 1);
                }
                for (let i = enemies.length - 1; i >= 0; i--) {
                    enemies[i].update(); enemies[i].draw();
                    for (let j = projectiles.length - 1; j >= 0; j--) {
                        const d = Math.hypot(enemies[i].x - projectiles[j].x, enemies[i].y - projectiles[j].y);
                        if (d < enemies[i].radius + projectiles[j].radius) {
                            enemies.splice(i, 1); projectiles.splice(j, 1); score++;
                            updateHUD();
                            if (score >= LEVELS[currentLevel].goal) winLevel();
                            break;
                        }
                    }
                    if (enemies[i] && enemies[i].y > canvas.height + 60) {
                        enemies.splice(i, 1); health -= 20; updateHUD();
                        if (health <= 0) { gameActive = false; showScreen('screen-fail'); }
                    }
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function playLevelCompleteSound() {
            try {
                levelCompleteSound.currentTime = 0;
                levelCompleteSound.play().catch(() => {});
            } catch (_) {}
        }

        function winLevel() {
            gameActive = false;
            playLevelCompleteSound();
            if (currentLevel === unlockedLevel && unlockedLevel < 10) unlockedLevel++;
            if (selectedSingle.trim()) {
                userProgress[selectedSingle.trim()] = {
                    unlockedLevel,
                    lastCouple: selectedCouple
                };
            }
            updateResumeButton();
            const winStageTitle = document.getElementById('win-stage-title');
            const winHeader = document.getElementById('win-header');
            const winMsg = document.getElementById('win-message');
            const winEmoji = document.getElementById('win-emoji');
            winStageTitle.innerText = LEVELS[currentLevel].title;
            if (currentLevel === 10) {
                winEmoji.innerText = "🏁";
                winHeader.innerText = "MISSION COMPLETE";
                winHeader.classList.remove('text-green-400');
                winHeader.classList.add('text-cyan-400', 'glitch-text');
                winMsg.innerText = `Successfully Decoupled! ${selectedSingle} has liberated the target from the bounds of relationship.`;
                document.getElementById('next-level-btn').innerText = "Finish Mission";
            } else {
                winEmoji.innerText = "💔";
                winHeader.innerText = "STAGE CLEARED";
                winHeader.classList.add('text-green-400');
                winHeader.classList.remove('text-cyan-400', 'glitch-text');
                winMsg.innerText = `${selectedCouple} is drifting apart. ${selectedSingle} proceeds to the next phase of de-coupling.`;
                document.getElementById('next-level-btn').innerText = "Next Target";
            }
            showScreen('screen-win');
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            player.x = canvas.width / 2; player.y = canvas.height - 120;
        });

        const move = (e) => { if (gameActive) player.x = e.touches ? e.touches[0].clientX : e.clientX; };
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, { passive: false });
        window.addEventListener('mousedown', () => { if (gameActive) projectiles.push(new Projectile(player.x, player.y - 25)); });
        window.addEventListener('touchstart', (e) => { 
            if (gameActive && !['BUTTON', 'INPUT'].includes(e.target.tagName)) projectiles.push(new Projectile(player.x, player.y - 25));
        });

        window.dispatchEvent(new Event('resize'));
        gameLoop();
    </script>
</body>
</html>
